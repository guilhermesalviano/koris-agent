name: "CodeQL Analysis"

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze Code with CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    permissions:
      security-events: write
      contents: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Use security-extended query suite for more thorough analysis
          # Options: 'default', 'security-extended', 'security-and-quality'
          queries: security-extended
          # Optional: Specify custom queries
          # config-file: ./.github/codeql/codeql-config.yml

      # Autobuild attempts to build code automatically
      # For JavaScript/TypeScript, this typically just installs dependencies
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      # Alternative: Manual build steps (if autobuild fails)
      # - name: Build
      #   run: |
      #     pnpm install
      #     pnpm build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          # Upload results even if there are errors
          upload: true
          # Optional: Fail the build if vulnerabilities are found
          # This is disabled by default to avoid blocking PRs
          # fail-build: false

      - name: Upload CodeQL results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-results-${{ matrix.language }}
          path: |
            ${{ github.workspace }}/**/*.sarif
          retention-days: 30
          if-no-files-found: ignore

  summary:
    name: CodeQL Summary
    runs-on: ubuntu-latest
    needs: analyze
    if: always()
    
    steps:
      - name: Create summary
        run: |
          echo "## 🔍 CodeQL Analysis Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Analysis Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Language:** JavaScript/TypeScript" >> $GITHUB_STEP_SUMMARY
          echo "- **Query Suite:** Security Extended" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ needs.analyze.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What Was Scanned" >> $GITHUB_STEP_SUMMARY
          echo "- Command injection vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "- Path traversal issues" >> $GITHUB_STEP_SUMMARY
          echo "- Cross-site scripting (XSS)" >> $GITHUB_STEP_SUMMARY
          echo "- Prototype pollution" >> $GITHUB_STEP_SUMMARY
          echo "- Regular expression DoS (ReDoS)" >> $GITHUB_STEP_SUMMARY
          echo "- Insecure randomness" >> $GITHUB_STEP_SUMMARY
          echo "- Cleartext storage of sensitive data" >> $GITHUB_STEP_SUMMARY
          echo "- And 200+ other security patterns" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Check the **Security** tab for any alerts" >> $GITHUB_STEP_SUMMARY
          echo "2. Review and triage any findings" >> $GITHUB_STEP_SUMMARY
          echo "3. Dismiss false positives as needed" >> $GITHUB_STEP_SUMMARY
          echo "4. Fix any confirmed vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.analyze.result }}" == "success" ]; then
            echo "✅ **Analysis completed successfully!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Analysis completed with warnings. Check logs above.**" >> $GITHUB_STEP_SUMMARY
          fi

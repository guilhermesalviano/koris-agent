name: Security Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  security-tests:
    name: Run Security Test Suite
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security tests
        run: pnpm test tests/security --reporter=verbose

      - name: Generate coverage report
        run: pnpm test:coverage -- tests/security
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          flags: security
          name: security-tests
        continue-on-error: true

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-results-node-${{ matrix.node-version }}
          path: |
            coverage/
            .testresults/
          retention-days: 30

  security-analysis:
    name: Security Analysis
    runs-on: ubuntu-latest
    needs: security-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: security-tests
    if: always()

    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          pattern: security-test-results-*
          merge-multiple: true

      - name: Create test summary
        run: |
          echo "## 🔒 Security Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Categories" >> $GITHUB_STEP_SUMMARY
          echo "- Path Traversal Protection" >> $GITHUB_STEP_SUMMARY
          echo "- Command Injection Protection" >> $GITHUB_STEP_SUMMARY
          echo "- Input Validation" >> $GITHUB_STEP_SUMMARY
          echo "- Credential & Secret Exposure" >> $GITHUB_STEP_SUMMARY
          echo "- Markdown Injection Protection" >> $GITHUB_STEP_SUMMARY
          echo "- Authorization & Access Control" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Status" >> $GITHUB_STEP_SUMMARY
          echo "All security tests completed. See job logs for details." >> $GITHUB_STEP_SUMMARY

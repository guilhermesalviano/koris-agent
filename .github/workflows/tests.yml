name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 8.5.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run tests with coverage
        run: pnpm run test:coverage --reporter=verbose
        continue-on-error: true

      - name: Check if coverage was generated
        id: check-coverage
        run: |
          if [ -f ./apps/client/coverage/coverage-final.json ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload coverage reports
        if: steps.check-coverage.outputs.found == 'true'
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/client/coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>opencrawdio chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #0a0a0f;
        --bg-2: #111118;
        --bg-3: #18181f;
        --bg-4: #1e1e28;
        --border: rgba(255,255,255,0.07);
        --border-2: rgba(255,255,255,0.12);
        --text: #e8e8f0;
        --text-2: #8888a0;
        --text-3: #555568;
        --accent: #6c63ff;
        --accent-2: #8b84ff;
        --accent-bg: rgba(108,99,255,0.12);
        --accent-border: rgba(108,99,255,0.3);
        --green: #22c55e;
        --amber: #f59e0b;
        --red: #ef4444;
        --radius: 12px;
        --radius-lg: 18px;
        --mono: 'DM Mono', monospace;
        --sans: 'DM Sans', sans-serif;
      }

      html, body { height: 100%; }

      body {
        font-family: var(--sans);
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        font-size: 14px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      /* Subtle grid background */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(108,99,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(108,99,255,0.03) 1px, transparent 1px);
        background-size: 32px 32px;
        pointer-events: none;
        z-index: 0;
      }

      #app {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
        background: rgba(10,10,15,0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        flex-shrink: 0;
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .logo {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        background: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .logo svg { width: 16px; height: 16px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

      .header-title { font-size: 13px; font-weight: 500; letter-spacing: 0.02em; }
      .header-sub { font-size: 11px; color: var(--text-3); font-family: var(--mono); margin-top: 1px; }

      .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
      .status-pill {
        display: flex; align-items: center; gap: 5px;
        font-size: 11px; font-family: var(--mono); color: var(--text-3);
        background: var(--bg-3); border: 1px solid var(--border);
        padding: 3px 9px; border-radius: 20px;
      }
      .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); transition: background 0.3s; }
      .status-dot.thinking { background: var(--amber); }
      .status-dot.error { background: var(--red); }

      /* ── Chat ── */
      #chat {
        flex: 1;
        overflow-y: auto;
        padding: 24px 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        scroll-behavior: smooth;
      }
      #chat::-webkit-scrollbar { width: 3px; }
      #chat::-webkit-scrollbar-track { background: transparent; }
      #chat::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }

      /* ── Empty state ── */
      .empty-state {
        margin: auto;
        text-align: center;
        padding: 40px 24px;
        max-width: 380px;
      }
      .empty-icon {
        width: 52px; height: 52px; border-radius: 14px;
        background: var(--bg-3); border: 1px solid var(--border-2);
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 16px;
      }
      .empty-icon svg { width: 24px; height: 24px; stroke: var(--text-3); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
      .empty-state h2 { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
      .empty-state p { font-size: 13px; color: var(--text-2); line-height: 1.6; }
      .suggestions { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-top: 20px; }
      .suggestion-btn {
        font-size: 12px; font-family: var(--mono);
        padding: 6px 13px; border: 1px solid var(--border-2);
        border-radius: 20px; background: var(--bg-3);
        color: var(--text-2); cursor: pointer;
        transition: all 0.15s ease;
      }
      .suggestion-btn:hover { border-color: var(--accent-border); color: var(--accent-2); background: var(--accent-bg); }

      /* ── Messages ── */
      .message-row {
        display: flex;
        gap: 10px;
        animation: msgIn 0.22s cubic-bezier(0.34,1.56,0.64,1) both;
      }
      .message-row.user { flex-direction: row-reverse; }

      @keyframes msgIn {
        from { opacity: 0; transform: translateY(10px) scale(0.98); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      .avatar {
        width: 28px; height: 28px; border-radius: 50%;
        flex-shrink: 0; display: flex; align-items: center; justify-content: center;
        font-size: 10px; font-weight: 500; font-family: var(--mono);
        margin-top: 4px;
        letter-spacing: 0;
      }
      .avatar.assistant { background: var(--accent); color: white; }
      .avatar.user { background: var(--bg-4); border: 1px solid var(--border-2); color: var(--text-2); }

      .bubble-col { display: flex; flex-direction: column; gap: 4px; max-width: calc(100% - 44px); }
      .message-row.user .bubble-col { align-items: flex-end; }

      .bubble {
        padding: 10px 14px;
        border-radius: var(--radius-lg);
        font-size: 14px;
        line-height: 1.65;
        word-break: break-word;
        position: relative;
      }
      .bubble.user {
        background: var(--accent);
        color: white;
        border-bottom-right-radius: 5px;
      }
      .bubble.assistant {
        background: var(--bg-3);
        border: 1px solid var(--border);
        color: var(--text);
        border-bottom-left-radius: 5px;
      }

      /* Markdown inside bubbles */
      .bubble p { margin: 0 0 8px; } .bubble p:last-child { margin: 0; }
      .bubble strong { font-weight: 500; }
      .bubble em { font-style: italic; }
      .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
      .bubble li { margin-bottom: 3px; }
      .bubble h1,.bubble h2,.bubble h3 { font-weight: 500; margin: 12px 0 5px; }
      .bubble h1 { font-size: 16px; }
      .bubble h2 { font-size: 15px; }
      .bubble h3 { font-size: 14px; color: var(--text-2); }
      .bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

      .bubble code:not(pre code) {
        font-family: var(--mono);
        font-size: 12px;
        background: rgba(255,255,255,0.08);
        padding: 1px 6px;
        border-radius: 5px;
        color: var(--accent-2);
      }
      .bubble.user code:not(pre code) { background: rgba(255,255,255,0.2); color: white; }

      .bubble pre {
        background: var(--bg);
        border: 1px solid var(--border-2);
        border-radius: 10px;
        padding: 12px 14px;
        margin: 10px 0;
        overflow-x: auto;
        position: relative;
      }
      .bubble pre code {
        font-family: var(--mono);
        font-size: 12px;
        line-height: 1.6;
        color: #c8c8e8;
      }
      /* Code language label */
      .bubble pre::before {
        content: attr(data-lang);
        position: absolute;
        top: 8px; right: 10px;
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-3);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .timestamp { font-size: 11px; color: var(--text-3); font-family: var(--mono); padding: 0 4px; }

      /* ── Thinking dots ── */
      .thinking {
        display: flex; align-items: center; gap: 5px;
        padding: 12px 16px;
      }
      .thinking span {
        width: 5px; height: 5px; border-radius: 50%;
        background: var(--text-3);
        animation: blink 1.3s ease-in-out infinite;
        flex-shrink: 0;
      }
      .thinking span:nth-child(2) { animation-delay: 0.2s; }
      .thinking span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes blink { 0%,80%,100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }

      /* ── Input area ── */
      .input-area {
        padding: 12px 16px 16px;
        border-top: 1px solid var(--border);
        background: rgba(10,10,15,0.9);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        flex-shrink: 0;
      }

      .input-box {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        background: var(--bg-3);
        border: 1px solid var(--border-2);
        border-radius: var(--radius-lg);
        padding: 10px 10px 10px 16px;
        transition: border-color 0.2s;
      }
      .input-box:focus-within { border-color: var(--accent-border); }

      #message {
        flex: 1;
        background: none;
        border: none;
        outline: none;
        font-family: var(--sans);
        font-size: 14px;
        color: var(--text);
        resize: none;
        max-height: 130px;
        min-height: 22px;
        line-height: 1.55;
        padding: 0;
      }
      #message::placeholder { color: var(--text-3); }

      #send-btn {
        width: 34px; height: 34px;
        border-radius: 10px;
        background: var(--accent);
        border: none;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        transition: all 0.15s;
        position: relative;
        overflow: hidden;
      }
      #send-btn::after {
        content: '';
        position: absolute;
        inset: 0;
        background: white;
        opacity: 0;
        transition: opacity 0.15s;
      }
      #send-btn:hover:not(:disabled)::after { opacity: 0.1; }
      #send-btn:active:not(:disabled) { transform: scale(0.94); }
      #send-btn:disabled { opacity: 0.35; cursor: default; }
      #send-btn svg { width: 15px; height: 15px; stroke: white; fill: none; position: relative; z-index: 1; }

      .input-meta {
        display: flex; justify-content: space-between; align-items: center;
        padding: 6px 4px 0;
        font-size: 11px;
        color: var(--text-3);
        font-family: var(--mono);
      }
      .char-count { transition: color 0.2s; }
      .char-count.warn { color: var(--amber); }

      /* ── Error toast ── */
      .toast {
        position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
        background: #2a1212; border: 1px solid rgba(239,68,68,0.3);
        color: #fca5a5; font-size: 13px; font-family: var(--mono);
        padding: 9px 16px; border-radius: 10px;
        animation: toastIn 0.2s ease, toastOut 0.3s ease 3s forwards;
        z-index: 100;
        white-space: nowrap;
      }
      @keyframes toastIn  { from { opacity:0; transform: translateX(-50%) translateY(8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
      @keyframes toastOut { from { opacity:1; } to { opacity:0; } }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <div class="logo">
          <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        </div>
        <div>
          <div class="header-title">opencrawdio</div>
          <div class="header-sub">ai chat</div>
        </div>
        <div class="header-right">
          <div class="status-pill">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-label">online</span>
          </div>
        </div>
      </header>

      <div id="chat">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>
          <h2>What can I help with?</h2>
          <p>Ask anything — code, concepts, writing, analysis. I'll think it through with you.</p>
          <div class="suggestions">
            <button class="suggestion-btn" onclick="fillPrompt('Explain how streaming works in the Fetch API')">fetch streaming</button>
            <button class="suggestion-btn" onclick="fillPrompt('Write a Python function to parse JSON safely')">safe JSON parse</button>
            <button class="suggestion-btn" onclick="fillPrompt('What is the difference between RAG and fine-tuning?')">RAG vs fine-tuning</button>
            <button class="suggestion-btn" onclick="fillPrompt('How do I center a div in CSS?')">center a div</button>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-box">
          <textarea id="message" placeholder="Ask something…" rows="1" autocomplete="off"></textarea>
          <button id="send-btn" disabled title="Send message">
            <svg viewBox="0 0 24 24" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <div class="input-meta">
          <span>↵ send · ⇧↵ newline</span>
          <span class="char-count" id="char-count">0</span>
        </div>
      </div>
    </div>

    <script>
      const chatEl    = document.getElementById('chat');
      const messageEl = document.getElementById('message');
      const sendBtn   = document.getElementById('send-btn');
      const emptyEl   = document.getElementById('empty-state');
      const statusDot = document.getElementById('status-dot');
      const statusLbl = document.getElementById('status-label');
      const charCount = document.getElementById('char-count');

      let history    = [];
      let streaming  = false;
      const MAX_CHARS = 4000;

      /* ── Utilities ── */
      function setStatus(state) {
        statusDot.className = 'status-dot' + (state !== 'online' ? ' ' + state : '');
        statusLbl.textContent = state;
      }

      function timeStr() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }

      function showToast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3500);
      }

      function fillPrompt(text) {
        messageEl.value = text;
        messageEl.dispatchEvent(new Event('input'));
        messageEl.focus();
      }

      /* ── Markdown renderer ── */
      function renderMarkdown(raw) {
        let s = raw
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

        // Fenced code blocks
        s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
          const label = lang || '';
          return `<pre data-lang="${label}"><code>${code.trim()}</code></pre>`;
        });

        // Inline code
        s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');

        // Bold / italic
        s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
        s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');

        // Headings
        s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
        s = s.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
        s = s.replace(/^# (.+)$/gm,   '<h1>$1</h1>');

        // Horizontal rule
        s = s.replace(/^---+$/gm, '<hr>');

        // Unordered lists
        s = s.replace(/((?:^- .+\n?)+)/gm, m => {
          const items = m.trim().split('\n').map(l => `<li>${l.slice(2)}</li>`).join('');
          return `<ul>${items}</ul>`;
        });

        // Ordered lists
        s = s.replace(/((?:^\d+\. .+\n?)+)/gm, m => {
          const items = m.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('');
          return `<ol>${items}</ol>`;
        });

        // Paragraphs
        const blocks = s.split(/\n\n+/);
        s = blocks.map(b => {
          if (/^<(pre|ul|ol|h[1-3]|hr)/.test(b.trim())) return b;
          return `<p>${b.replace(/\n/g, '<br>')}</p>`;
        }).join('');

        return s;
      }

      /* ── DOM helpers ── */
      function removeEmpty() {
        if (emptyEl && emptyEl.parentNode) emptyEl.remove();
      }

      function appendUserMsg(text) {
        removeEmpty();
        const safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
        const row = document.createElement('div');
        row.className = 'message-row user';
        row.innerHTML = `
          <div class="bubble-col">
            <div class="bubble user">${safe}</div>
            <span class="timestamp">${timeStr()}</span>
          </div>
          <div class="avatar user">you</div>`;
        chatEl.appendChild(row);
        chatEl.scrollTop = chatEl.scrollHeight;
      }

      function createAssistantRow() {
        const row = document.createElement('div');
        row.className = 'message-row';
        row.innerHTML = `
          <div class="avatar assistant">ai</div>
          <div class="bubble-col">
            <div class="bubble assistant" id="active-bubble">
              <div class="thinking"><span></span><span></span><span></span></div>
            </div>
          </div>`;
        chatEl.appendChild(row);
        chatEl.scrollTop = chatEl.scrollHeight;
        return row;
      }

      function finalizeRow(row, text) {
        const bubble = row.querySelector('.bubble');
        bubble.removeAttribute('id');
        bubble.innerHTML = renderMarkdown(text || 'No response.');
        const col = row.querySelector('.bubble-col');
        const ts = document.createElement('span');
        ts.className = 'timestamp';
        ts.textContent = timeStr();
        col.appendChild(ts);
        chatEl.scrollTop = chatEl.scrollHeight;
      }

      /* ── Input handling ── */
      messageEl.addEventListener('input', () => {
        const len = messageEl.value.length;
        sendBtn.disabled = !messageEl.value.trim() || streaming;
        messageEl.style.height = 'auto';
        messageEl.style.height = Math.min(messageEl.scrollHeight, 130) + 'px';
        charCount.textContent = len;
        charCount.className = 'char-count' + (len > MAX_CHARS * 0.85 ? ' warn' : '');
      });

      messageEl.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          if (!sendBtn.disabled) submit();
        }
      });

      sendBtn.addEventListener('click', submit);

      /* ── Submit ── */
      async function submit() {
        const text = messageEl.value.trim();
        if (!text || streaming) return;

        streaming = true;
        sendBtn.disabled = true;
        setStatus('thinking');

        history.push({ role: 'user', content: text });
        appendUserMsg(text);
        messageEl.value = '';
        messageEl.style.height = 'auto';
        charCount.textContent = '0';

        const row = createAssistantRow();
        let accumulated = '';
        let firstChunk  = true;

        console.log(text)

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text }),
          });

          if (!res.ok) throw new Error(`API error ${res.status}`);

          const reader  = res.body.getReader();
          const decoder = new TextDecoder();
          const bubble  = row.querySelector('.bubble');

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const lines = decoder.decode(value, { stream: true }).split('\n');
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              const payload = line.slice(6).trim();
              if (payload === '[DONE]') continue;
              try {
                const parsed = JSON.parse(payload);
                if (parsed.type === 'content_block_delta' && parsed.delta?.text) {
                  if (firstChunk) { bubble.innerHTML = ''; firstChunk = false; }
                  accumulated += parsed.delta.text;
                  bubble.innerHTML = renderMarkdown(accumulated);
                  chatEl.scrollTop = chatEl.scrollHeight;
                }
              } catch { /* skip malformed SSE lines */ }
            }
          }

          history.push({ role: 'assistant', content: accumulated || 'No response.' });
          finalizeRow(row, accumulated);
          setStatus('online');

        } catch (err) {
          const msg = err.message || 'Request failed';
          history.push({ role: 'assistant', content: msg });
          finalizeRow(row, msg);
          setStatus('error');
          showToast('Error: ' + msg);
          setTimeout(() => setStatus('online'), 3000);
        } finally {
          streaming = false;
          sendBtn.disabled = !messageEl.value.trim();
          messageEl.focus();
        }
      }
    </script>
  </body>
</html>
